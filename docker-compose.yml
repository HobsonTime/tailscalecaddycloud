services:
  # Optional Tailscale container
  # ts-tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: <somethingcool:will show up on tailscale>
  #   hostname: caddytailscale
  #   network_mode: host
  #   environment:
  #     - TS_AUTHKEY=${TS_AUTHKEY}
  #     - TS_STATE_DIR=/var/lib/tailscale
  #     - TS_USERSPACE=false
  #   volumes:
  #     - /path/to/tailscale/state:/var/lib/tailscale
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - net_admin
  #   restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caddycloudflare
    network_mode: host
    volumes:
      - ${CADDYFILE_PATH}:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config_data:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    restart: unless-stopped
    dns:
      - 100.100.100.100 #Tailscale
      - 1.1.1.1 #fallback
  
  
volumes:
  caddy_data:
  caddy_config_data:
